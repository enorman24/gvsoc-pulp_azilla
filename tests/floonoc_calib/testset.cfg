from gvtest.testsuite import *


def testset_build(testset):
    testset.set_name('floonoc_calib')

    testset.new_make_test('default', flags='CASE=default',
                          build_resource='gvsoc.core.build', no_clean=True)
    testset.new_make_test('router', flags='CASE=router',
                          build_resource='gvsoc.core.build', no_clean=True)
    testset.new_make_test('mesh', flags='CASE=mesh',
                          build_resource='gvsoc.core.build', no_clean=True)
